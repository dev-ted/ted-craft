name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run validate
      - run: bun run generate
      - name: Check generated files are committed
        run: |
          git diff --exit-code -- registry/index.json apps/web/src/data/registry.json apps/web/content/docs/registry || (
            echo "Generated registry outputs are stale. Run bun run generate and commit."
            exit 1
          )

  web:
    runs-on: ubuntu-latest
    needs: validate-registry
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run types:check
      - run: bun run build
