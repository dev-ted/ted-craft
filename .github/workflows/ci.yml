name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run validate
      - run: bun run generate
      - name: Check generated files are committed
        run: |
          # -I ignores generatedAt-only churn if a timestamp ever slips through.
          if ! git diff -I '"generatedAt"' --exit-code -- \
            registry/index.json \
            apps/web/src/data/registry.json \
            apps/web/content/docs/registry
          then
            echo "Generated registry outputs are stale. Run bun run generate and commit."
            exit 1
          fi

  web:
    runs-on: ubuntu-latest
    needs: validate-registry
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run types:check
      - run: bun run build
