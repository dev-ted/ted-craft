name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run validate
      - run: npm run generate
      - name: Check generated files are committed
        run: |
          git diff --exit-code -- registry/index.json apps/web/src/data/registry.json apps/web/content/docs/registry || (
            echo "Generated registry outputs are stale. Run npm run generate and commit."
            exit 1
          )

  web:
    runs-on: ubuntu-latest
    needs: validate-registry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run types:check
      - run: npm run build
