name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run npm publish (no package uploaded)"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run cli:build

      - name: Assert tag matches package version
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          EXPECTED="cli-v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match packages/cli version $VERSION (expected $EXPECTED)"
            exit 1
          fi
          echo "Tag $TAG matches package version $VERSION"

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        working-directory: packages/cli
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: >
          startsWith(github.ref, 'refs/tags/cli-v') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
